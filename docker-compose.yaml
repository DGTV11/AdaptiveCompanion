services:
  # chroma:
  #   image: chromadb/chroma:1.0.20
  #   # ports:
  #   #   - "8000:8000"
  #   volumes:
  #     - chromadb:/data
  #   environment:
  #     IS_PERSISTENT: true
  #     ANONYMIZED_TELEMETRY: false
  postgres:
    image: postgres:alpine3.22
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: 
      - "5464:5464"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: -p 5464
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 5464"]
      interval: 5s
      timeout: 5s
      retries: 5
  adaptivecompanion:
    build: .
    # develop:
      # watch:
        # - action: rebuild
        #   path: ./pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # - .:/app
      # - /app/.venv
      - ./backends.yaml:/app/backends.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    ports: 
      - "5555:5555"
    env_file:
      - .env
volumes:
  chromadb:
  postgres_data:
